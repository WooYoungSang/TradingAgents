schema_version: "2.3.1"
template_type: "adr"

meta:
  id: "ADR-0003"
  title: "Structured output contract = TradePlan.v1"
  status: "accepted"
  date: "2026-03-05"
  deciders:
    - "TradingAgents Fork Maintainers"
  category: "architecture"

governance:
  immutability: "mutable"

links:
  project: "tradingagents-fork"
  fr: ["FR-003"]
  nfr: ["NFR-002", "NFR-003"]
  uow: ["UOW-208"]
  ref:
    - "tradingagents/contracts/trade_plan.py"
    - "tradingagents/output/trade_plan_builder.py"
  deprecates: []

spec:
  context: |
    Free-form final decision text is not sufficient for deterministic downstream automation.

  decision: |
    Emit TradePlan.v1 on every successful run while keeping legacy decision string output.
    Use strict JSON generation with bounded repair retries.
    If retries are exhausted, surface explicit parse failure (TRADEPLAN_PARSE_FAILED).

  alternatives:
    - id: "ALT-001"
      title: "Keep free-form output only"
      description: "No additional structured contract"
      rejected_reason: "Low machine readability and brittle integrations"

  consequences:
    positive:
      - "Stable machine-consumable output"
      - "Backward compatibility preserved"
    negative:
      - "Additional model call per run"
    risks:
      - risk: "JSON formatting failures"
        mitigation: "Validation + repair loop + explicit error surface"

implementation:
  files:
    create:
      - "tradingagents/contracts/trade_plan.py"
      - "tradingagents/output/trade_plan_builder.py"
    modify:
      - "tradingagents/graph/trading_graph.py"
      - "tradingagents/default_config.py"
    delete: []
  verification:
    tests: []
    commands: ["python -m compileall ."]

verification:
  checks:
    - type: "schema_validate"
      command: "ssot lint adr {{ssot_path}}"

trace:
  ssot_path: "docs/ssot/adr/ADR-0003-structured-output-tradeplan-v1.yaml"
  minio_key: "projects/{project}/ssot/adr/ADR-0003.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "adr"
      doc_id: "ADR-0003"
      state: "accepted"
  embed:
    include_paths: ["spec.context", "spec.decision", "spec.alternatives", "spec.consequences"]
