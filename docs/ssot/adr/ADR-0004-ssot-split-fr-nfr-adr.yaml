schema_version: "2.3.1"
template_type: "adr"

meta:
  id: "ADR-0004"
  title: "SSOT canonical model = one-item-one-file"
  status: "accepted"
  date: "2026-03-05"
  deciders:
    - "TradingAgents Fork Maintainers"
  category: "architecture"

governance:
  immutability: "mutable"

links:
  project: "tradingagents-fork"
  fr: ["FR-001", "FR-002", "FR-003", "FR-004"]
  nfr: ["NFR-001", "NFR-002", "NFR-003", "NFR-004"]
  uow: []
  ref: ["docs/SSOT.md"]
  deprecates: []

spec:
  context: |
    Bundled SSOT docs made requirement-level change tracking and ownership unclear.

  decision: |
    Canonical SSOT records are split into atomic FR/NFR/ADR files.
    Each requirement or architectural decision must map to exactly one YAML file.
    docs/SSOT.md remains index-only.

  alternatives:
    - id: "ALT-001"
      title: "Type-level bundled docs"
      description: "Single FR/NFR/ADR file per type"
      rejected_reason: "Still too coarse for item-level ownership and traceability"

  consequences:
    positive:
      - "Clear ownership at requirement granularity"
      - "Simpler reviews and diff scope"
    negative:
      - "More files to maintain"
    risks:
      - risk: "Index drift"
        mitigation: "Require index update in same PR when adding/removing items"

implementation:
  files:
    create:
      - "docs/ssot/fr/*.yaml"
      - "docs/ssot/nfr/*.yaml"
      - "docs/ssot/adr/*.yaml"
    modify:
      - "docs/SSOT.md"
    delete: []
  verification:
    tests: []
    commands: ["python -m compileall ."]

verification:
  checks:
    - type: "schema_validate"
      command: "ssot lint adr {{ssot_path}}"

trace:
  ssot_path: "docs/ssot/adr/ADR-0004-ssot-split-fr-nfr-adr.yaml"
  minio_key: "projects/{project}/ssot/adr/ADR-0004.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "adr"
      doc_id: "ADR-0004"
      state: "accepted"
  embed:
    include_paths: ["spec.context", "spec.decision", "spec.alternatives", "spec.consequences"]
