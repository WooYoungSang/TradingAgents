schema_version: "2.3.1"
template_type: "adr"

meta:
  id: "ADR-0007"
  title: "Data vendor policy = tool-level override first, fallback on rate limit"
  status: "accepted"
  date: "2026-03-05"
  deciders:
    - "TradingAgents Fork Maintainers"
  category: "architecture"

governance:
  immutability: "mutable"

links:
  project: "tradingagents-fork"
  fr: ["FR-007"]
  nfr: ["NFR-006"]
  uow: []
  ref:
    - "tradingagents/dataflows/interface.py"
    - "tradingagents/dataflows/config.py"
  deprecates: []

spec:
  context: |
    Data source behavior must be controllable at fine granularity while remaining resilient to vendor constraints.

  decision: |
    Resolve vendor in this order: tool_vendors override -> data_vendors category.
    Build fallback chain from configured vendors plus remaining supported vendors.
    Trigger failover for AlphaVantage rate-limit errors.

  alternatives:
    - id: "ALT-001"
      title: "Single fixed vendor"
      description: "Use one vendor globally"
      rejected_reason: "Low flexibility and poor resilience to vendor outages/rate limits"

  consequences:
    positive:
      - "Fine-grained routing control"
      - "Improved resilience under rate limiting"
    negative:
      - "More complex vendor configuration"
    risks:
      - risk: "Unexpected fallback order"
        mitigation: "Documented precedence and deterministic chain construction"

implementation:
  files:
    create: []
    modify:
      - "tradingagents/dataflows/interface.py"
      - "tradingagents/default_config.py"
    delete: []
  verification:
    tests: []
    commands: ["python -m compileall ."]

verification:
  checks:
    - type: "schema_validate"
      command: "ssot lint adr {{ssot_path}}"

trace:
  ssot_path: "docs/ssot/adr/ADR-0007-data-vendor-policy-tool-first-fallback.yaml"
  minio_key: "projects/{project}/ssot/adr/ADR-0007.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "adr"
      doc_id: "ADR-0007"
      state: "accepted"
  embed:
    include_paths: ["spec.context", "spec.decision", "spec.alternatives", "spec.consequences"]
