schema_version: "2.4.0"
template_type: "uow"

uow_id: "UOW-203"
title: "Integrate Polygon vendor routing with strict fallback semantics"
goal: "Wire Polygon into routing/config while keeping deterministic precedence and 429-only fallback policy."

risk_tier: "R2"

scope:
  included:
    - "Register polygon vendor for get_stock_data mapping"
    - "Ensure fallback trigger is typed rate-limit only"
    - "Keep default data vendor behavior unchanged"
  excluded:
    - "Changing default data_vendors from yfinance"
    - "Fallback broadening to generic exceptions"

ssot:
  pointers:
    - "docs/ssot/fr/FR-007-data-vendor-routing.yaml"
    - "docs/ssot/nfr/NFR-006-data-artifact-path-stability.yaml"
    - "docs/ssot/adr/ADR-0007-data-vendor-policy-tool-first-fallback.yaml"
    - "tradingagents/dataflows/interface.py"
    - "tradingagents/dataflows/alpha_vantage_common.py"
  invariants:
    - "tool_vendors overrides data_vendors"
    - "Fallback only on typed rate-limit errors"
    - "No artifact path contract changes"
  provenance_policy:
    require_source_version_trust: true

constraints:
  - "No new dependencies"
  - "Keep existing vendor keys yfinance and alpha_vantage functional"
  - "No changes to results_dir/eval_results path conventions"

dod:
  checklist:
    - "interface routing map includes polygon for get_stock_data"
    - "rate-limit detection is not conflated with auth/misconfiguration failures"
    - "default_config keeps yfinance as default"
  evidence_required:
    - "artifacts/evidence/<timestamp>-UOW-203/summary.md"
    - "artifacts/evidence/<timestamp>-UOW-203/verify.log"

verification:
  ladder_level: 3
  commands:
    - "python -m compileall ."

evidence_pack:
  base_dir: "artifacts/evidence"
  required_files:
    - "summary.md"
    - "verify.log"
    - "changed_files.txt"
    - "version.txt"
  optional_files:
    - "coverage.txt"

gates:
  confirm_execution_token: ""
  require_manual_approval: true

links:
  project: "tradingagents-fork"
  fr: ["FR-007"]
  nfr: ["NFR-006"]
  adr: ["ADR-0007"]
  ref: []
  depends_on_uow: ["UOW-201", "UOW-202"]

spec:
  description: |
    Integrate polygon into route_to_vendor for get_stock_data with strict semantics.
    Fallback must occur only for typed rate-limit exceptions.
    Non-429 failures (e.g., invalid key) must surface as failures.
  requirements:
    - "tool_vendors precedence over data_vendors remains unchanged."
    - "Fallback chain ordering is deterministic from configured vendor list."
    - "alpha_vantage rate-limit classification must not treat api-key errors as retryable."
    - "default_config remains backward-compatible with yfinance default."

  targets:
    files:
      create: []
      modify:
        - "tradingagents/dataflows/interface.py"
        - "tradingagents/default_config.py"
        - "tradingagents/dataflows/alpha_vantage_common.py"
      delete: []

  tdd:
    red:
      tests:
        - "tests/unit/test_data_vendor_routing.py"
    green:
      impl_files:
        - "tradingagents/dataflows/interface.py"
        - "tradingagents/default_config.py"
        - "tradingagents/dataflows/alpha_vantage_common.py"

  acceptance_refs:
    - "FR-007:AC-001"
    - "FR-007:AC-002"
    - "NFR-006:AC-001"

  evidence:
    required_types: ["code", "test", "execution"]
    commands:
      - "python -m compileall ."

governance:
  immutability: "mutable"
  phase: "planned"

notion:
  enabled: false
  release_page_url: ""
  task_page_url: ""
  allow_status_update: false
  fields:
    evidence_pack_link_field: "Evidence Pack Link"
    status_field: "Status"

closed_loop:
  enabled: true
  postmortem_dir: "postmortems"
  generate_postmortem_on_failure: true
  propose_dod_update: true

trace:
  ssot_path: "docs/ssot/uow/UOW-203-routing-fallback-semantics.yaml"
  minio_key: "projects/{project}/ssot/uow/UOW-203.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "uow"
      doc_id: "UOW-203"
      priority: "p1"
  embed:
    include_paths: ["spec.targets", "spec.tdd", "spec.acceptance_refs"]
