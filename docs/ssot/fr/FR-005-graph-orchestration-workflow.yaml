schema_version: "2.3.1"
template_type: "fr"

meta:
  id: "FR-005"
  title: "Graph orchestration workflow across analyst, research, trader, and risk stages"
  state: "active"
  priority: "critical"
  category: "core"
  version: "1.0.0"
  created: "2026-03-05"
  updated: "2026-03-05"
  owner: "tradingagents-fork"

governance:
  immutability: "mutable"
  freeze_on_state: "active"
  change_policy:
    requires_new_version_for:
      - "spec.contract"
      - "spec.acceptance"

links:
  project: "tradingagents-fork"
  nfr: ["NFR-005"]
  adr: ["ADR-0005"]
  uow: ["UOW-210"]
  ref:
    - "tradingagents/graph/setup.py"
    - "tradingagents/graph/conditional_logic.py"
    - "tradingagents/graph/trading_graph.py"

spec:
  summary: |
    The runtime shall execute a staged graph: selected analysts -> bull/bear research debate -> research manager -> trader -> risk debate -> risk judge.

  contract:
    operation_id: "orchestrate_trading_graph"
    version: "1.0.0"
    breaking_change: false
    kind: "job"
    transport:
      http:
        enabled: false
        base_path: "/tools"
        endpoints: []
      mcp:
        tool_name: "orchestrate_trading_graph"

    inputs:
      - name: "selected_analysts"
        type: "array[string]"
        required: true
      - name: "company_name"
        type: "string"
        required: true
      - name: "trade_date"
        type: "string"
        required: true

    outputs:
      - name: "final_state"
        type: "object"
      - name: "decision"
        type: "string"

    errors:
      - code: "NO_ANALYST_SELECTED"
        http_status: 400

    timeout: "120s"
    otel_span: "job.orchestrate_trading_graph"

  acceptance:
    - id: "AC-001"
      statement: "When selected_analysts is empty, setup raises a deterministic error."
      test:
        file: "tradingagents/graph/setup.py"
        function: "setup_graph"
        command: "python -m compileall ."
    - id: "AC-002"
      statement: "Successful propagate returns final_state and decision after full stage traversal."
      test:
        file: "tradingagents/graph/trading_graph.py"
        function: "propagate"
        command: "python -m compileall ."

verification:
  checks:
    - type: "schema_validate"
      command: "ssot lint fr {{ssot_path}}"

trace:
  ssot_path: "docs/ssot/fr/FR-005-graph-orchestration-workflow.yaml"
  minio_key: "projects/{project}/ssot/fr/FR-005.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "fr"
      doc_id: "FR-005"
      state: "active"
      operation_id: "orchestrate_trading_graph"
  embed:
    include_paths: ["spec.contract", "spec.acceptance"]
