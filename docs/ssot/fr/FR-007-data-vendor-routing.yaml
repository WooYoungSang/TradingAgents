schema_version: "2.3.1"
template_type: "fr"

meta:
  id: "FR-007"
  title: "Data vendor routing with tool-level precedence and fallback"
  state: "active"
  priority: "high"
  category: "core"
  version: "1.1.0"
  created: "2026-03-05"
  updated: "2026-03-05"
  owner: "tradingagents-fork"

governance:
  immutability: "mutable"
  freeze_on_state: "active"
  change_policy:
    requires_new_version_for:
      - "spec.contract"
      - "spec.acceptance"

links:
  project: "tradingagents-fork"
  nfr: ["NFR-006"]
  adr: ["ADR-0007"]
  uow: ["UOW-201"]
  ref:
    - "tradingagents/dataflows/interface.py"
    - "tradingagents/dataflows/config.py"

spec:
  summary: |
    Dataflow calls shall route by tool/category vendor config with tool_vendors overriding data_vendors.
    Polygon support is explicitly phase-scoped to get_stock_data only, and fallback is triggered only by typed rate-limit errors.

  contract:
    operation_id: "route_to_vendor"
    version: "1.1.0"
    breaking_change: false
    kind: "tool"
    transport:
      http:
        enabled: false
        base_path: "/tools"
        endpoints: []
      mcp:
        tool_name: "route_to_vendor"

    inputs:
      - name: "method"
        type: "string"
        required: true
      - name: "args"
        type: "array"
        required: false

    outputs:
      - name: "vendor_result"
        type: "object|string"
        constraints:
          - "If method == get_stock_data, output MUST be a CSV-compatible string."

    errors:
      - code: "METHOD_NOT_SUPPORTED"
        http_status: 400
      - code: "NO_AVAILABLE_VENDOR"
        http_status: 503
      - code: "RATE_LIMIT_TYPED"
        http_status: 429

    timeout: "30s"
    otel_span: "tool.route_to_vendor"
    routing_policy:
      vendor_scope:
        polygon:
          enabled_for: ["get_stock_data"]
          excluded_methods:
            - "get_indicators"
            - "get_fundamentals"
            - "get_balance_sheet"
            - "get_cashflow"
            - "get_income_statement"
            - "get_news"
            - "get_global_news"
            - "get_insider_transactions"
      fallback:
        trigger_error_types: ["AlphaVantageRateLimitError"]
        non_trigger_policy: "Do not continue fallback chain for non-typed exceptions."

  acceptance:
    - id: "AC-001"
      statement: "Tool-level vendor setting takes precedence over category-level vendor setting."
      test:
        file: "tradingagents/dataflows/interface.py"
        function: "get_vendor"
        command: "python -m compileall ."
    - id: "AC-002"
      statement: "Polygon vendor routing scope is limited to get_stock_data and excludes indicators/fundamentals/news methods."
      test:
        file: "tradingagents/dataflows/interface.py"
        function: "VENDOR_METHODS"
        command: "python -m compileall ."
    - id: "AC-003"
      statement: "Fallback chain advances only when the raised error type is AlphaVantageRateLimitError."
      test:
        file: "tradingagents/dataflows/interface.py"
        function: "route_to_vendor"
        command: "python -m compileall ."
    - id: "AC-004"
      statement: "get_stock_data output remains CSV-compatible string for configured vendors, including Polygon when enabled."
      test:
        file: "tradingagents/agents/utils/core_stock_tools.py"
        function: "get_stock_data"
        command: "python -m compileall ."

verification:
  checks:
    - type: "schema_validate"
      command: "ssot lint fr {{ssot_path}}"

trace:
  ssot_path: "docs/ssot/fr/FR-007-data-vendor-routing.yaml"
  minio_key: "projects/{project}/ssot/fr/FR-007.json"
  index_status: "pending"

indexing:
  qdrant:
    payload:
      project_id: "tradingagents-fork"
      doc_type: "fr"
      doc_id: "FR-007"
      state: "active"
      operation_id: "route_to_vendor"
  embed:
    include_paths: ["spec.contract", "spec.acceptance"]
